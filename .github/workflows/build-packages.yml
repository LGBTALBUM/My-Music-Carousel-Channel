name: Build Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            command: npx electron-builder --win nsis zip --x64 --publish never
            artifact_name: MMCC-windows-x64
            artifact_glob: |
              dist/*.exe
              dist/*.zip
              dist/*.blockmap

          - name: macos-arm64
            os: macos-15
            command: npx electron-builder --mac zip --arm64 --publish never
            artifact_name: MMCC-macos-arm64
            artifact_glob: |
              dist/*.zip
              dist/*.blockmap

          - name: linux-deb-x64
            os: ubuntu-latest
            command: npx electron-builder --linux deb --x64 --publish never
            artifact_name: MMCC-linux-deb-x64
            artifact_glob: |
              dist/*.deb

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove local/generated data
        shell: bash
        run: |
          rm -rf data MMCCDB release dist
          find . -name '._*' -not -path './.git/*' -delete
          find . -name '.DS_Store' -not -path './.git/*' -delete

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libopenjp2-tools fakeroot dpkg

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Build package
        shell: bash
        run: ${{ matrix.command }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Upload to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.blockmap
