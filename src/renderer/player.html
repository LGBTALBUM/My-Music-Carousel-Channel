<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>Music Carousel Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="player">
  <div id="bg"></div>
  <video id="pv" class="hidden" playsinline></video>
  <audio id="audio"></audio>

  <div id="overlay">
    <div id="meta">
      <div id="title" class="meta-line"><span>歌曲名</span></div>
      <div id="album" class="meta-line"><span>收錄專輯</span></div>
      <div id="year" class="meta-line"><span>年份</span></div>
    </div>
    <div id="lyrics">
      <div id="lyricInner" class="status">滾動歌詞<br>（自下而上）</div>
    </div>
  </div>

  <script src="player.js"></script>
</body>
</html>
